<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Enzo Fortes Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --gold: #d4af37;
      --gold-dark: #b8860b;
      --black: #070707;
      --gray: #1a1a1a;
      --text: #f0f0f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--black);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Login Screen --- */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--gray);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .login-card h1 {
      color: var(--gold);
      margin-bottom: 8px;
      font-size: 24px;
    }

    .login-card p {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
    }

    .form-group input {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      padding: 12px 16px;
      border-radius: 8px;
      color: white;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: black;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    .btn-primary:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
    }

    /* --- Admin Dashboard --- */
    #admin-dashboard {
      display: none;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--gray);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #333;
    }

    .stat-card h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .video-item {
      background: var(--gray);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      transition: transform 0.3s;
    }

    .video-item:hover {
      transform: translateY(-5px);
    }

    .video-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #000;
    }

    .video-info {
      padding: 20px;
    }

    .video-info h4 {
      margin-bottom: 4px;
      font-size: 16px;
    }

    .video-info p {
      color: #888;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn-sm {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      font-weight: 600;
    }

    .btn-edit { background: #333; color: white; }
    .btn-delete { background: #ff4444; color: white; }

    /* --- Modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: var(--gray);
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      border: 1px solid #333;
    }

    .modal h2 {
      margin-bottom: 24px;
      color: var(--gold);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-cancel { background: transparent; border: 1px solid #333; color: white; }

    /* Custom Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--gold);
      color: black;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      transform: translateY(100px);
      transition: transform 0.3s;
      z-index: 1000;
    }

    #toast.show { transform: translateY(0); }

  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Painel Admin</h1>
      <p>Acesse para gerenciar o portfolio do Enzo</p>
      <form id="login-form">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">ENTRAR NO PAINEL</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="admin-dashboard">
    <header>
      <div class="logo-text">ENZO FORTES <span style="color: white; font-weight: 300;">| ADMIN</span></div>
      <button class="btn-sm btn-edit" onclick="logout()">Sair</button>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total de Vídeos</h3>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <h3>Última Atualização</h3>
        <div class="value" style="font-size: 18px; margin-top: 10px;">Hoje</div>
      </div>
    </div>

    <div class="section-title">
      <h2>Gerenciar Vídeos</h2>
      <button class="btn-primary" style="width: auto; padding: 10px 20px;" onclick="openModal()">+ NOVO VÍDEO</button>
    </div>

    <div class="video-grid" id="admin-video-grid">
      <!-- Vídeos serão listados aqui -->
    </div>
  </div>

  <!-- Modal Adicionar/Editar -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Novo Vídeo</h2>
      <form id="video-form">
        <input type="hidden" id="video-id">
        <div class="form-group">
          <label>Título (Ex: Reel 29)</label>
          <input type="text" id="video-title" required>
        </div>
        <div class="form-group">
          <label>Localização (Ex: Local)</label>
          <input type="text" id="video-location" value="Local" required>
        </div>
        <div class="form-group">
          <label>Caminho do Vídeo (Ex: assets/videos/nome.mp4)</label>
          <input type="text" id="video-url" required>
        </div>
        <div class="form-group">
          <label>Caminho da Capa (Ex: assets/capa.jpg)</label>
          <input type="text" id="video-poster" value="assets/WhatsApp Image 2026-04-24 at 16.34.08 (1).jpeg" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-sm btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-sm btn-primary">SALVAR VÍDEO</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast">Alteração salva com sucesso!</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/videos.js"></script>
  <script>
    const supabaseClient = (SUPABASE_URL !== 'SUA_URL_DO_SUPABASE' && window.supabase) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    // --- Autenticação Simples ---
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Painel Admin carregado. Pronto para login.');
      
      const loginForm = document.getElementById('login-form');
      const loginScreen = document.getElementById('login-screen');
      const adminDashboard = document.getElementById('admin-dashboard');

      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const user = document.getElementById('username').value.trim();
          const pass = document.getElementById('password').value.trim();

          console.log('Tentativa de login com:', user);

          if (user === 'admin' && pass === 'enzo2026') {
            console.log('Login bem-sucedido!');
            loginScreen.style.display = 'none';
            adminDashboard.style.display = 'block';
            localStorage.setItem('admin-logged', 'true');
            loadVideos();
          } else {
            console.warn('Falha no login: Credenciais incorretas.');
            alert('Usuário ou senha incorretos!');
          }
        });
      }

      if (localStorage.getItem('admin-logged') === 'true') {
        console.log('Sessão ativa encontrada.');
        loginScreen.style.display = 'none';
        adminDashboard.style.display = 'block';
        setTimeout(loadVideos, 100);
      }
    });

    function logout() {
      localStorage.removeItem('admin-logged');
      location.reload();
    }

    // --- Gerenciamento de Vídeos com Supabase ---
    let videos = [];

    async function loadVideos() {
      const grid = document.getElementById('admin-video-grid');
      const totalStat = document.getElementById('stat-total');
      
      if (!supabaseClient || SUPABASE_URL === 'SUA_URL_DO_SUPABASE') {
        // Fallback para localStorage/INITIAL_VIDEOS enquanto não configura
        const savedVideos = localStorage.getItem('enzo-videos');
        videos = savedVideos ? JSON.parse(savedVideos) : (window.INITIAL_VIDEOS || []);
      } else {
        const { data, error } = await supabaseClient
          .from('videos')
          .select('*')
          .order('id', { ascending: true });
        
        if (error) {
          console.error('Erro ao buscar vídeos:', error);
        } else {
          videos = data.map(v => ({
            id: v.id,
            title: v.title,
            location: v.location,
            videoUrl: v.video_url,
            posterUrl: v.poster_url
          }));
        }
      }

      totalStat.textContent = videos.length;
      grid.innerHTML = '';

      videos.forEach((v, index) => {
        const item = document.createElement('div');
        item.className = 'video-item';
        item.innerHTML = `
          <img src="${v.posterUrl}" class="video-thumb">
          <div class="video-info">
            <h4>${v.title}</h4>
            <p>${v.location}</p>
            <div class="actions">
              <button class="btn-sm btn-edit" onclick="editVideo(${index})">Editar</button>
              <button class="btn-sm btn-delete" onclick="deleteVideo(${index})">Excluir</button>
            </div>
          </div>
        `;
        grid.appendChild(item);
      });
    }

    function openModal(index = null) {
      const overlay = document.getElementById('modal-overlay');
      const title = document.getElementById('modal-title');
      const form = document.getElementById('video-form');
      
      overlay.style.display = 'flex';
      
      if (index !== null) {
        const v = videos[index];
        title.textContent = 'Editar Vídeo';
        document.getElementById('video-id').value = v.id || index; // Usa ID do Supabase ou index local
        document.getElementById('video-title').value = v.title;
        document.getElementById('video-location').value = v.location;
        document.getElementById('video-url').value = v.videoUrl;
        document.getElementById('video-poster').value = v.posterUrl;
      } else {
        title.textContent = 'Novo Vídeo';
        form.reset();
        document.getElementById('video-id').value = '';
        document.getElementById('video-location').value = 'Local';
        document.getElementById('video-poster').value = 'assets/WhatsApp Image 2026-04-24 at 16.34.08 (1).jpeg';
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    document.getElementById('video-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('video-id').value;
      const videoData = {
        title: document.getElementById('video-title').value,
        location: document.getElementById('video-location').value,
        video_url: document.getElementById('video-url').value,
        poster_url: document.getElementById('video-poster').value
      };

      if (!supabaseClient || SUPABASE_URL === 'SUA_URL_DO_SUPABASE') {
        // Lógica local fallback
        if (id !== '' && isNaN(id)) { /* editando existente no fallback */ }
        // ... (mantido apenas para teste rápido)
        showToast('Configure o Supabase para salvar permanentemente!');
        return;
      }

      let result;
      if (id !== '') {
        result = await supabaseClient.from('videos').update(videoData).eq('id', id);
      } else {
        result = await supabaseClient.from('videos').insert([videoData]);
      }

      if (result.error) {
        alert('Erro ao salvar: ' + result.error.message);
      } else {
        loadVideos();
        closeModal();
        showToast();
      }
    });

    async function deleteVideo(index) {
      if (confirm('Tem certeza que deseja excluir este vídeo?')) {
        const v = videos[index];
        if (supabaseClient && v.id) {
          const { error } = await supabaseClient.from('videos').delete().eq('id', v.id);
          if (error) alert('Erro ao excluir: ' + error.message);
        }
        loadVideos();
        showToast();
      }
    }

    function editVideo(index) {
      openModal(index);
    }

    function showToast(msg = 'Alteração salva com sucesso!') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
